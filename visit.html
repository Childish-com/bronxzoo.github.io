    <main>
        <section id="visit">
            <h1>Visit The Bronx Zoo</h1>
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3024.5!2d-73.8772!3d40.8506!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c28b743c97c6d5%3A0x1c6b82f9c1b9c6d5!2sBronx%20Zoo!5e0!3m2!1sen!2sus!4v1623456789012!5m2!1sen!2sus" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
            <h2>Parking and Accessibility</h2>
            <p>Parking is available on-site with fees. The zoo is wheelchair accessible with ramps and elevators throughout the park.</p>
            <h2>Contact Us</h2>
            <form action="mailto:info@bronxzoo.org" method="post" enctype="text/plain">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>
                <button type="submit">Send</button>
            </form>
        </section>
    </main>
